<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#050816] flex justify-center items-center min-h-screen text-white">

  <div class="w-[380px] bg-[#10152d] rounded-3xl p-6 shadow-2xl">

    <p class="text-gray-400 text-sm mb-2">LOCKED</p>

    <h1 class="text-3xl font-bold mb-3">
      Buy Premium to Unlock Results
    </h1>

    <p class="text-gray-400 mb-6">
      Choose your plan to continue.
    </p>

    <div class="bg-[#1b1d45] p-5 rounded-2xl mb-4">

      <div class="flex justify-between items-center mb-5">
        <div>
          <p class="text-sm text-gray-300">Yearly Subscription</p>
          <h2 class="text-2xl font-bold">$99</h2>
        </div>

        <div class="bg-blue-500 px-3 py-1 rounded-full text-sm">
          Best
        </div>
      </div>

      <button class="w-full bg-cyan-400 text-black py-3 rounded-2xl font-bold" id="planBtn">
        Choose Plan
      </button>

    </div>

  </div>

</body>
</html>
